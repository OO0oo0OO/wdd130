<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML and CSS Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>

    <main>
        <form>
            <h1>✅ Basic HTML and CSS Quiz</h1>
            <fieldset>
                <div class="quiz-item {$}">
                    <label for="q1">1. What does the acronym CSS stand for?</label>
                    <input type="text" name="q1" id="q1">
                </div>
                <div>
                    <label for="q2">2. How are id and class attributes selected in CSS?</label>
                    <textarea name="q2" id="q2" rows="4" placeholder="Open answer ..."></textarea>
                </div>
                <div>
                    <label for="q3">3. Which of the following is a valid CSS comment?</label>
                    <select name="q3" id="q3">
                        <option value="default" selected disabled>Choose One</option>
                        <option value="doubleslash">A. //</option>
                        <option value="hyphens">B. --</option>
                        <option value="valid">C. /* */</option>
                    </select>
                </div>
                <div>
                    <label for="q4">4.What is the bottom margin given this declaration?</label>
                    <code>margin: 10px 5px 15px;</code>
                    <input type="number" name="q4" id="q4">
                </div>
                <button type="submit">Submit Quiz</button>
            </fieldset>
        </form>
    </main>
</body>

</html>
